# Opt-in override for semantic search via Ollama embeddings.
# Usage: docker compose -f docker-compose.yml -f docker-compose.ollama.yml up -d
services:
  api:
    environment:
      - OLLAMA_URL=http://ollama:11434

  worker:
    environment:
      - OLLAMA_URL=http://ollama:11434

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        limits:
          memory: 2G
    restart: unless-stopped

  # Pull the embedding model on first startup
  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      - ollama
    restart: "no"
    entrypoint: ["ollama", "pull", "nomic-embed-text"]
    environment:
      OLLAMA_HOST: http://ollama:11434

volumes:
  ollama_data:
