services:
  api:
    build:
      context: ./api
      dockerfile: ../docker/Dockerfile.api
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-trackforge}:${POSTGRES_PASSWORD:-trackforge}@postgres:5432/${POSTGRES_DB:-trackforge}?sslmode=disable
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    ports:
      - "${WEB_PORT:-3000}:80"
    depends_on:
      - api
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trackforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trackforge}
      POSTGRES_DB: ${POSTGRES_DB:-trackforge}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trackforge}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
